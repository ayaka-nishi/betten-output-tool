name: Build desktop apps

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install pyinstaller
      - name: Build macOS app
        run: |
          pyinstaller --name BettenTool --windowed --onedir \
            --add-data "templates:templates" \
            --add-data "static:static" \
            --add-data "証明書作成.py:." \
            --collect-all docx \
            app.py
      - uses: actions/upload-artifact@v4
        with:
          name: mac-app
          path: dist/BettenTool.app

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install pyinstaller
      - name: Build Windows exe
        run: |
          pyinstaller --name BettenTool --windowed --onefile `
            --add-data "templates;templates" `
            --add-data "static;static" `
            --add-data "証明書作成.py;." `
            --collect-all docx `
            app.py
      - uses: actions/upload-artifact@v4
        with:
          name: windows-exe
          path: dist/BettenTool.exe
